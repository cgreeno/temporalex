name: Bug Report
description: Report a bug in Temporalex
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps or code snippet to reproduce the issue.
      placeholder: |
        1. Define a workflow that...
        2. Run `Temporalex.Client.start_workflow(...)`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Temporalex version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: elixir_otp
    attributes:
      label: Elixir / OTP version
      placeholder: "Elixir 1.17 / OTP 27"
    validations:
      required: true

  - type: input
    id: temporal_server
    attributes:
      label: Temporal server version
      placeholder: "1.24.0 or Temporal Cloud"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or stacktrace
      description: Paste any relevant output. This will be formatted as code.
      render: shell
