name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.17.3"
  OTP_VERSION: "27.1"
  RUST_VERSION: "stable"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            native/temporalex_native/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-rust-${{ hashFiles('native/temporalex_native/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-rust-

      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            native/temporalex_native/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-rust-${{ hashFiles('native/temporalex_native/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-rust-

      - run: mix deps.get
      - run: mix test --exclude e2e

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            native/temporalex_native/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-rust-${{ hashFiles('native/temporalex_native/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-rust-

      - run: mix deps.get
      - run: mix compile --force

      - name: Install Temporal CLI
        run: |
          curl -sSf https://temporal.download/cli.sh | sh
          echo "${HOME}/.temporalio/bin" >> $GITHUB_PATH

      - name: Start Temporal dev server
        run: |
          temporal server start-dev --headless &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if temporal operator namespace describe default 2>/dev/null; then
              echo "Temporal server is ready"
              break
            fi
            echo "Waiting for Temporal server... ($i/30)"
            sleep 2
          done

      - name: Run E2E tests
        run: mix test --only e2e
