# Hex Release
#
# How to release:
#   1. Bump @version in mix.exs (e.g. "0.1.0" -> "0.2.0")
#   2. Update CHANGELOG.md
#   3. Commit: git commit -am "Release v0.2.0"
#   4. Tag:    git tag v0.2.0
#   5. Push:   git push && git push --tags
#
# The tag push triggers this workflow. It validates the tag matches
# mix.exs, runs tests, and publishes to hex.pm.
#
# Manual trigger is also available from the Actions tab (dry run by default).

name: Hex Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't actually publish)"
        required: false
        type: boolean
        default: true

jobs:
  release:
    name: Publish to Hex.pm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17.3"
          otp-version: "27.1"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            native/temporalex_native/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-rust-${{ hashFiles('native/temporalex_native/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-rust-

      - run: mix deps.get

      - name: Validate tag matches mix.exs version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          MIX_VERSION=$(grep '@version "' mix.exs | sed 's/.*"\(.*\)".*/\1/')
          echo "Tag version: $TAG_VERSION"
          echo "Mix version: $MIX_VERSION"
          if [ "$TAG_VERSION" != "$MIX_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match mix.exs version $MIX_VERSION"
            exit 1
          fi

      - run: mix compile --warnings-as-errors
      - run: mix test --exclude e2e

      - name: Build docs
        run: mix docs

      # Tag push → real publish
      - name: Publish to Hex
        if: startsWith(github.ref, 'refs/tags/v')
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      # Manual trigger with dry_run=true → dry run
      - name: Publish to Hex (dry run)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && inputs.dry_run }}
        run: mix hex.publish --yes --dry-run
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      # Manual trigger with dry_run=false → real publish
      - name: Publish to Hex (manual)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run }}
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
